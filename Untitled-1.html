<DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Quiz interativo</title>
        <link rel="stylesheet" href="h1 {.css">   
      </head>
    <body>
    
        <div class="container">
        <h1>Quiz de League of Legends</h1>
        <p>Pontuação: <span id="score">0</span></p>
    
        <h2 id="numero-questao">Questão 1</h2>
        <p id="texto-questao">Carregando pergunta...</p>
        
        <img id="imagem-questao" src="https://pbs.twimg.com/media/GA24i-gXgAADdTV.png" alt="Item do Quiz" style="max-width: 80px; margin-bottom: 15px; display: none;">
        
        <div id="alternativas-container" class="container-botoes"></div>
                                         
        <button id="nextBtn">Próxima Pergunta</button>
    
        <p id="feedback"></p>
        <button id="btnReiniciar">Reiniciar Quiz</button>
      
    </div>
      
    <script src="Untitled-3.js"></script>
    </body>
    </html>
